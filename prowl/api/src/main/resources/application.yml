spring:
  application:
    name: nekodion-api
  jpa:
    hibernate:
      ddl-auto: none
  datasource:
    url: jdbc:mysql://localhost:3368/${DB_NAME}?serverTimezone=Asia/Tokyo
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
auth0:
  issuer: ${ISSUER}
  audience: ${AUDIENCE}
gmail:
  credentials-path: ${GMAIL_CREDENTIALS_PATH:credentials.json}
  redirect-uri: ${GMAIL_REDIRECT_URI:http://localhost:8080/api/gmail/callback}
  frontend-url: ${GMAIL_FRONTEND_URL:http://localhost:3000}
  encryption-key: ${GMAIL_TOKEN_ENCRYPTION_KEY}
  state-secret: ${GMAIL_STATE_SECRET}
